version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: mhrs-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mhrs_db
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: mhrs-backend
    restart: always
    ports:
      - "8005:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db/mhrs_db

  frontend:
    build: ./frontend
    container_name: mhrs-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
